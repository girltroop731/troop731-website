# fly.toml app configuration file generated for troop731 on 2026-03-09T20:53:30Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'troop731-staging'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/data'
  NODE_ENV = 'staging'
  PORT = '3000'

[[mounts]]
  source = 'troop_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
